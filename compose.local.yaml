services:
  app:
    build: .
    image: misty-app-local
    ports:
      - "8080:8080"
    environment:
      DEV_USER_ID: ${DEV_USER_ID:-}
      APNS_DEVELOPMENT: "true"

  db:
    ports:
      - "5432:5432"

  caddy:
    profiles: [disabled]

secrets:
  cloudflare_api_token:
    file: /dev/null
  aop_ca_cert:
    file: /dev/null
