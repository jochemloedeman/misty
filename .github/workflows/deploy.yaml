name: Deploy

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - component: app
            context: "."
            image: ghcr.io/jochemloedeman/misty
          - component: caddy
            context: "./caddy"
            image: ghcr.io/jochemloedeman/misty/caddy
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ matrix.image }}
          tags: |
            type=sha
            type=raw,value=latest

      - uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ matrix.image }}:buildcache
          cache-to: type=registry,ref=${{ matrix.image }}:buildcache,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment: prod
    steps:
      - uses: actions/checkout@v5

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_CLIENT_SECRET }}
          tags: tag:ci
          ping: ${{ vars.DEPLOY_HOST }}

      - name: Copy compose files to server
        run: |
          tar cf - compose.yaml | \
            tailscale ssh deploy@${{ vars.DEPLOY_HOST }} \
            "tar xf - -C /opt/misty/"

      - name: Deploy
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
        run: |
          tailscale ssh deploy@"$DEPLOY_HOST" \
            GHCR_TOKEN="$GHCR_TOKEN" bash -s << 'SCRIPT'
          echo "$GHCR_TOKEN" | docker login ghcr.io -u github-actions --password-stdin
          cd /opt/misty
          docker compose pull
          docker logout ghcr.io
          docker compose up -d --remove-orphans
          docker image prune -f
          SCRIPT
