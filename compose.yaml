services:

  app:
    build: .
    restart: unless-stopped
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      SIGNING_SECRET_FILE: /run/secrets/signing_secret
      SIGNING_SECRET_PREVIOUS_FILE: /run/secrets/signing_secret_previous
      DEV_USER_ID: ${DEV_USER_ID:-}
    secrets:
      - signing_secret
      - signing_secret_previous
      - postgres_password
    healthcheck:
      test: ["CMD", "/app", "health"]
      start_period: 3s
      interval: 30s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - frontend
      - backend

  db:
    image: postgres:18.3-alpine
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    volumes:
      - pgdata:/var/lib/postgresql
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      start_period: 5s
      interval: 3s
      timeout: 5s
      retries: 5
    secrets:
      - postgres_password
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - backend

  caddy:
    build: ./caddy
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    cap_add:
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true
    ports:
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./caddy/conf:/etc/caddy
      - ./caddy/site:/srv
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN}
    depends_on:
      app:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - frontend

volumes:
  pgdata:
  caddy_data:
  caddy_config:

networks:
  frontend:
  backend:

secrets:
  postgres_password:
    file: ${SECRETS_DIR:-/etc/misty/secrets}/postgres_password.txt
  signing_secret:
    file: ${SECRETS_DIR:-/etc/misty/secrets}/signing_secret.txt
  signing_secret_previous:
    file: ${SECRETS_DIR:-/etc/misty/secrets}/signing_secret_previous.txt
