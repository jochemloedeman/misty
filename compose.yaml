# Use postgres/example user/password credentials

services:

  app:
    image: misty:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      SIGNING_SECRET_FILE: /run/secrets/signing_secret
      SIGNING_SECRET_PREVIOUS_FILE: /run/secrets/signing_secret_previous
    secrets:
      - signing_secret
      - signing_secret_previous
      - postgres_password
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      start_period: 5s
      interval: 3s
      timeout: 5s
      retries: 5
      
  db:
    image: postgres:18.3-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    volumes:
      - pgdata:/var/lib/postgresql
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      start_period: 5s
      interval: 3s
      timeout: 5s
      retries: 5
    secrets:
      - postgres_password

  caddy:
    image: caddy:2.11.2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./site:/srv
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      app:
        condition: service_healthy
    

volumes:
  pgdata:
  caddy_data:
  caddy_config:

secrets:
  postgres_password:
    file: ${SECRETS_DIR:-/etc/misty/secrets}/postgres_password.txt
  signing_secret:
    file: ${SECRETS_DIR:-/etc/misty/secrets}/signing_secret.txt
  signing_secret_previous:
    file: ${SECRETS_DIR:-/etc/misty/secrets}/signing_secret_previous.txt