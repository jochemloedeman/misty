apiVersion: 1

contactPoints:
  - orgId: 1
    name: misty-ntfy
    receivers:
      - uid: misty-ntfy
        type: webhook
        settings:
          # ntfy JSON publish endpoint: post to the root URL, topic in the body.
          # NOT https://ntfy.sh/<topic> — that keeps the secret topic out of URL logs.
          url: https://ntfy.sh
          httpMethod: POST
          # Reshape Grafana's alert into ntfy's JSON schema. $NTFY_TOPIC is expanded
          # at provisioning load from the env var; the Go template uses no $-vars so
          # there is no collision. Map severity -> ntfy priority, status -> emoji tag.
          payload:
            template: |
              {
                "topic": "$NTFY_TOPIC",
                "title": "{{ if eq .Status "resolved" }}RESOLVED: {{ end }}{{ .CommonLabels.alertname }}",
                "message": "{{ range .Alerts }}{{ .Annotations.summary }}\n{{ end }}",
                "priority": {{ if eq .CommonLabels.severity "critical" }}5{{ else }}3{{ end }},
                "tags": ["{{ if eq .Status "firing" }}rotating_light{{ else }}white_check_mark{{ end }}"]
              }
