global:
  scrape_interval: 30s
  scrape_timeout: 10s
  evaluation_interval: 30s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: alloy
    static_configs:
      - targets: ["alloy:12345"]

  - job_name: loki
    static_configs:
      - targets: ["loki:3100"]

  - job_name: tempo
    static_configs:
      - targets: ["tempo:3200"]

  - job_name: grafana
    static_configs:
      - targets: ["grafana:3000"]

  # Pending app instrumentation: app:8080 does not resolve on this network yet,
  # so this target stays DOWN until the app exposes /metrics and shares a network.
  - job_name: misty-app
    metrics_path: /metrics
    static_configs:
      - targets: ["app:8080"]
