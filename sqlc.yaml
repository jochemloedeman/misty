version: "2"
sql:
  - schema: "db/migrations"
    queries: "db/query/monitors.sql"
    engine: "postgresql"
    gen:
      go:
        out: "monitor/postgres/sqlc"
        sql_package: "pgx/v5"
  - schema: "db/migrations"
    queries: "db/query/notifications.sql"
    engine: "postgresql"
    gen:
      go:
        out: "monitor/postgres/sqlc"
        sql_package: "pgx/v5"
  - schema: "db/migrations"
    queries: "db/query/forecasts.sql"
    engine: "postgresql"
    gen:
      go:
        out: "monitor/postgres/sqlc"
        sql_package: "pgx/v5"
  - schema: "db/migrations"
    queries: "db/query/users.sql"
    engine: "postgresql"
    gen:
      go:
        out: "users/postgres/sqlc"
        sql_package: "pgx/v5"
